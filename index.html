<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Animeh</title>
    <link rel="icon" href="data:," />
  </head>
  <body>
    <div style="visibility: hidden; overflow: scroll; width: 99px"></div>
    <div
      tabindex="-1"
      class="fixed z-90 hidden h-54 w-96 rounded-md md:right-8 md:bottom-6 lg:right-12 lg:bottom-10 [&_.control]:h-4 [&_.control]:p-0 [&_.module]:hidden"
      style="opacity: 0"
    >
      <div class="relative h-full w-full origin-top-left overflow-hidden">
        <div class="absolute inset-0 flex">
          <div class="grow"></div>
          <div class="relative z-1 mx-auto grid aspect-video h-full grid-cols-10">
            <div class="col-span-3 flex items-center justify-center">
              <div
                class="pointer-events-none flex h-16 w-16 items-center justify-center rounded-full bg-black/60 text-2xl"
                style="
                  opacity: 0;
                  transform: scale(0);
                  transition:
                    opacity 0.2s ease-in-out,
                    transform 0.2s ease-in-out;
                "
              >
                -<span></span>
              </div>
            </div>
            <div class="col-span-4 flex items-center justify-center">
              <div
                class="flex h-16 w-16 items-center justify-center rounded-full bg-black/60 text-2xl"
                style="
                  opacity: 0;
                  transform: scale(0);
                  transition:
                    opacity 0.2s ease-in-out,
                    transform 0.2s ease-in-out;
                "
              ></div>
            </div>
            <div class="col-span-3 flex items-center justify-center">
              <div
                class="pointer-events-none flex h-16 w-16 items-center justify-center rounded-full bg-black/60 text-2xl"
                style="
                  opacity: 0;
                  transform: scale(0);
                  transition:
                    opacity 0.2s ease-in-out,
                    transform 0.2s ease-in-out;
                "
              >
                +<span></span>
              </div>
            </div>
            <div
              class="pointer-events-none absolute top-3 left-6 w-full [font-size:var(--text)] leading-(--size) [--multiplier:6] md:[--multiplier:12] lg:[--multiplier:16]"
              style="
                --size: calc(var(--spacing) * var(--multiplier));
                --text: calc(var(--multiplier) * 0.094rem);
              "
            >
              <div
                class="mt-3 w-fit max-w-[calc(100%-var(--size))] truncate rounded-full [border-inline-width:var(--text)] border-transparent bg-black/60"
                style="height: 0; opacity: 0"
              ></div>
              <div
                class="mt-3 h-16 w-24 rounded-full bg-black/60 px-2 text-center"
                style="opacity: 0; transition: opacity 0.2s ease-in-out"
              ></div>
            </div>
          </div>
          <div class="grow"></div>
        </div>
        <video class="h-full w-full" style="transition: filter 0.2s ease-in-out"></video>
        <div
          class="control absolute right-0 bottom-0 left-0 z-1 flex h-14 items-center justify-between gap-8 py-4"
          style="opacity: 0; transition: opacity 0.2s ease-in-out"
        >
          <!-- kalo pake px, bakal jadi padding-inline. dan itu gatau kenapa ngebuat jadi ga works -->
          <div
            class="group absolute right-0 left-0 z-2"
            style="padding: 8px 0 6px; transition: transform 0.2s ease-in-out"
          >
            <div
              class="@container-[size] relative mx-4 h-[4px] w-[calc(100%-var(--spacing)*8)] rounded-full bg-gray-700"
            >
              <div
                class="h-full origin-left will-change-transform"
                style="transform: scaleX(0)"
              ></div>
              <div class="absolute inset-0"></div>
              <div
                class="absolute left-0 z-1 h-[12px] w-[12px] rounded-full will-change-transform [--h:12px] [--x:6px] group-hover:h-[18px] group-hover:w-[18px] group-hover:[--x:9px] [&.hover]:h-[18px] [&.hover]:w-[18px] [&.hover]:[--x:9px]"
                style="
                  transform: translate(calc(0cqw - var(--x)), calc(-50% - 2px));
                  transition:
                    width 0.2s ease-in-out,
                    height 0.2s ease-in-out;
                "
              ></div>
              <div
                class="pointer-events-none absolute bottom-4 hidden flex-col items-center gap-2 will-change-transform"
                style="opacity: 0; transition: opacity 0.2s ease-in-out"
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="m18 9-6-6-6 6" />
                  <path d="M12 3v14" />
                  <path d="M5 21h14" />
                </svg>
                <div
                  class="rounded-md border border-foreground bg-background bg-no-repeat will-change-[background-position]"
                ></div>
                <div class="text-md rounded-full bg-background/75 px-4 py-2 text-white"></div>
              </div>
            </div>
            <div
              class="pointer-events-none relative hidden w-full"
              style="opacity: 0; transition: opacity 0.2s ease-in-out"
            ></div>
            <div
              class="pointer-events-none absolute top-0 left-1/2 z-2 hidden h-full w-[4px] -translate-x-1/2 bg-background/75"
              style="opacity: 0; transition: opacity 0.2s ease-in-out"
            >
              <div
                class="absolute translate-x-[calc(-50%+var(--spacing)*.5)] -translate-y-1/1 rounded-md bg-background/75 px-3 py-2"
              ></div>
            </div>
          </div>
          <div
            class="module mx-4 flex flex-[1_1_calc(1/3*100%)] justify-start gap-4"
            style="transition: transform 0.2s ease-in-out"
          ></div>
          <div
            class="module flex flex-[1_1_calc(1/3*100%)] justify-center gap-4"
            style="transition: transform 0.2s ease-in-out"
          ></div>
          <div
            class="module mx-4 flex flex-[1_1_calc(1/3*100%)] justify-end gap-4"
            style="transition: transform 0.2s ease-in-out"
          ></div>
        </div>
      </div>
      <button
        class="absolute top-2 left-2 z-1 m-2 flex h-6 w-6 cursor-pointer items-center justify-center rounded-xl bg-background/75"
        style="opacity: 0; transition: opacity 0.2s ease-in-out"
      >
        <svg
          width="12"
          height="12"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m15 15 6 6" />
          <path d="m15 9 6-6" />
          <path d="M21 16v5h-5" />
          <path d="M21 8V3h-5" />
          <path d="M3 16v5h5" />
          <path d="m3 21 6-6" />
          <path d="M3 8V3h5" />
          <path d="M9 9 3 3" />
        </svg>
      </button>
      <button
        class="absolute top-2 right-2 z-1 m-2 flex h-6 w-6 cursor-pointer items-center justify-center rounded-xl bg-background/75"
        style="opacity: 0; transition: opacity 0.2s ease-in-out"
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </button>
    </div>
    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
