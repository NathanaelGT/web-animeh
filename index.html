<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Animeh</title>
    <link rel="icon" href="data:," />
  </head>
  <body>
    <div style="visibility: hidden; overflow: scroll; width: 99px"></div>
    <div
      tabindex="-1"
      class="fixed z-90 hidden h-54 w-96 rounded-md md:right-8 md:bottom-6 lg:right-12 lg:bottom-10 [&_.control]:h-4 [&_.control]:p-0 [&_.module]:hidden"
      style="opacity: 0"
    >
      <div
        class="relative h-full w-full origin-top-left overflow-hidden bg-primary-foreground"
        style="border-radius: var(--radius-md)"
      >
        <video class="h-full w-full"></video>
        <div
          class="control absolute right-0 bottom-0 left-0 flex h-14 items-center justify-between gap-8 p-4"
          style="opacity: 0; transition: opacity 0.2s ease-in-out"
        >
          <div
            class="group absolute -top-[4px] right-[16px] left-[16px] h-[4px] cursor-pointer rounded-full bg-gray-700"
          >
            <div
              class="h-full origin-left bg-red-600 will-change-transform"
              style="transform: scaleX(0)"
            ></div>
            <div class="absolute inset-0"></div>
            <div
              class="absolute left-0 h-[12px] w-[12px] rounded-full bg-red-600 will-change-transform [--h:12px] [--x:6px] group-hover:h-[18px] group-hover:w-[18px] group-hover:[--x:9px] [&.hover]:h-[18px] [&.hover]:w-[18px] [&.hover]:[--x:9px]"
              style="
                transform: translate(calc(var(--x) * -1), calc(-50% - 2px));
                transition:
                  transform 0.2s ease-in-out,
                  width 0.2s ease-in-out,
                  height 0.2s ease-in-out;
              "
            ></div>
            <div
              class="pointer-events-none absolute bottom-[calc(20px+2rem)] rounded-sm border border-border bg-background bg-no-repeat will-change-[background-position] will-change-transform"
              style="opacity: 0; transition: opacity 0.2s ease-in-out"
            ></div>
          </div>
          <div class="module flex flex-[1_1_calc(1/3*100%)] justify-start gap-4"></div>
          <div class="module flex flex-[1_1_calc(1/3*100%)] justify-center gap-4"></div>
          <div class="module flex flex-[1_1_calc(1/3*100%)] justify-end gap-4"></div>
        </div>
      </div>
      <button
        class="absolute top-2 left-2 m-2 flex h-6 w-6 cursor-pointer items-center justify-center rounded-xl bg-background/75"
        style="opacity: 0; transition: opacity 0.2s ease-in-out"
      >
        <svg
          width="12"
          height="12"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m15 15 6 6" />
          <path d="m15 9 6-6" />
          <path d="M21 16v5h-5" />
          <path d="M21 8V3h-5" />
          <path d="M3 16v5h5" />
          <path d="m3 21 6-6" />
          <path d="M3 8V3h5" />
          <path d="M9 9 3 3" />
        </svg>
      </button>
      <button
        class="absolute top-2 right-2 m-2 flex h-6 w-6 cursor-pointer items-center justify-center rounded-xl bg-background/75"
        style="opacity: 0; transition: opacity 0.2s ease-in-out"
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </button>
    </div>
    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
